name: Publish Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for nuget.org Trusted Publishing (OIDC)
      contents: read

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: List directory structure
      run: |
        echo "Current directory:"
        pwd
        echo "Directory contents:"
        ls -la
        echo "Src directory contents:"
        ls -la src
        echo "ShowsOnSale.World directory contents:"
        ls -la src/ShowsOnSale.World

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Check .NET SDK
      run: |
        echo "Dotnet version:"
        dotnet --version
        echo "Dotnet info:"
        dotnet --info
        echo "Dotnet location:"
        which dotnet

    - name: Get version
      id: get_version
      run: |
        # Prefer the manual dispatch input; otherwise derive from the tag ref
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        # Remove 'v' prefix if it exists
        VERSION=${VERSION#v}
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Build and pack
      run: |
        dotnet build src/ShowsOnSale.World/ShowsOnSale.World.csproj --configuration Release
        dotnet pack src/ShowsOnSale.World/ShowsOnSale.World.csproj --configuration Release --no-build -p:Version=${{ env.VERSION }}

    - name: NuGet login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), NOT email

    - name: Push to NuGet
      run: |
        dotnet nuget push "src/ShowsOnSale.World/bin/Release/ShowsOnSale.World.${{ env.VERSION }}.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
